spring:
  application:
    name: manifest-reader-auth
  config:
    import:
      - optional:classpath:dev.yml
      - optional:nacos:${spring.application.name}-${spring.profiles.active:dev}.yml
  cloud:
    nacos:
      config:
        enabled: ${NACOS_CONFIG_ENABLED:true}
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yml
        username: ${NACOS_USERNAME:}
        password: ${NACOS_PASSWORD:}

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  packages-to-scan: com.manifest.auth.controller

manifest:
  auth:
    mybatis:
      enabled: ${AUTH_MYBATIS_ENABLED:true}
    token:
      issuer: ${AUTH_TOKEN_ISSUER:manifest-reader-auth}
      access-token-ttl: ${AUTH_ACCESS_TOKEN_TTL:30m}
      refresh-token-ttl: ${AUTH_REFRESH_TOKEN_TTL:7d}
      public-key-path: ${AUTH_PUBLIC_KEY_PATH:service/service-auth/target/auth-keys/public.pem}
      private-key-path: ${AUTH_PRIVATE_KEY_PATH:service/service-auth/target/auth-keys/private.pem}
