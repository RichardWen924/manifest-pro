spring:
  application:
    name: manifest-reader-auth
  config:
    import: optional:classpath:dev.yml
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration
      - com.baomidou.mybatisplus.autoconfigure.MybatisPlusAutoConfiguration

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  packages-to-scan: com.manifest.auth.controller

manifest:
  auth:
    mybatis:
      enabled: ${AUTH_MYBATIS_ENABLED:false}
    token:
      issuer: ${AUTH_TOKEN_ISSUER:manifest-reader-auth}
      access-token-ttl: ${AUTH_ACCESS_TOKEN_TTL:30m}
      refresh-token-ttl: ${AUTH_REFRESH_TOKEN_TTL:7d}
      public-key-path: ${AUTH_PUBLIC_KEY_PATH:}
      private-key-path: ${AUTH_PRIVATE_KEY_PATH:}
