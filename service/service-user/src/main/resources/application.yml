spring:
  application:
    name: manifest-reader-user
  config:
    import:
      - optional:classpath:dev.yml
      - optional:nacos:${spring.application.name}-${spring.profiles.active:dev}.yml
  cloud:
    nacos:
      config:
        enabled: ${NACOS_CONFIG_ENABLED:true}
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yml
        username: ${NACOS_USERNAME:}
        password: ${NACOS_PASSWORD:}
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:true}
        register-enabled: ${NACOS_REGISTER_ENABLED:true}
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        ip: ${NACOS_DISCOVERY_IP:}
        username: ${NACOS_USERNAME:}
        password: ${NACOS_PASSWORD:}

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html

manifest:
  llm-task:
    base-url: ${LLM_TASK_BASE_URL:}
  messaging:
    bill-parse:
      listener-enabled: ${BILL_PARSE_LISTENER_ENABLED:false}
    template-export:
      listener-enabled: ${TEMPLATE_EXPORT_LISTENER_ENABLED:false}
    template-extract:
      listener-enabled: ${TEMPLATE_EXTRACT_LISTENER_ENABLED:false}
    template-save:
      listener-enabled: ${TEMPLATE_SAVE_LISTENER_ENABLED:false}
  user:
    mybatis:
      enabled: ${USER_MYBATIS_ENABLED:true}
  storage:
    type: ${STORAGE_TYPE:minio}
    endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:manifest-reader}
  dify:
    enabled: ${DIFY_ENABLED:false}
    base-url: ${DIFY_BASE_URL:}
    api-key: ${DIFY_API_KEY:}
    template-api-key: ${DIFY_TEMPLATE_API_KEY:${DIFY_API_KEY:}}
    export-api-key: ${DIFY_EXPORT_API_KEY:${DIFY_API_KEY:}}
    file-upload-path: ${DIFY_FILE_UPLOAD_PATH:/v1/files/upload}
    workflow-run-path: ${DIFY_WORKFLOW_RUN_PATH:/v1/workflows/run}
    template-file-input-name: ${DIFY_TEMPLATE_FILE_INPUT_NAME:file}
    response-mode: ${DIFY_RESPONSE_MODE:blocking}
    user: ${DIFY_USER:manifest-reader}
    export-workflow-run-path: ${DIFY_EXPORT_WORKFLOW_RUN_PATH:/v1/workflows/run}
    export-file-input-name: ${DIFY_EXPORT_FILE_INPUT_NAME:file}
    export-response-mode: ${DIFY_EXPORT_RESPONSE_MODE:blocking}
    export-user: ${DIFY_EXPORT_USER:manifest-reader-export}
    bill-api-key: ${DIFY_BILL_API_KEY:${DIFY_EXPORT_API_KEY:${DIFY_API_KEY:}}}
    bill-workflow-run-path: ${DIFY_BILL_WORKFLOW_RUN_PATH:${DIFY_EXPORT_WORKFLOW_RUN_PATH:/v1/workflows/run}}
    bill-file-input-name: ${DIFY_BILL_FILE_INPUT_NAME:${DIFY_EXPORT_FILE_INPUT_NAME:file}}
    bill-response-mode: ${DIFY_BILL_RESPONSE_MODE:${DIFY_EXPORT_RESPONSE_MODE:blocking}}
    bill-user: ${DIFY_BILL_USER:manifest-reader-bill}
