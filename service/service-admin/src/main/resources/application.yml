spring:
  application:
    name: manifest-reader-admin
  config:
    import: optional:classpath:dev.yml

server:
  port: 8081
  servlet:
    context-path: /admin

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html

manifest:
  admin:
    mybatis:
      enabled: ${ADMIN_MYBATIS_ENABLED:true}
