spring:
  application:
    name: manifest-reader-gateway
  config:
    import: optional:classpath:dev.yml

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html

manifest:
  gateway:
    security:
      whitelist:
        - /actuator/**
        - /swagger-ui.html
        - /webjars/**
        - /v3/api-docs/**
        - /auth/login
        - /auth/token/refresh
        - /auth/token/introspect
        - /auth/public-key
