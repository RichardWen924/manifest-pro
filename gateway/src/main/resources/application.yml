spring:
  application:
    name: manifest-reader-gateway
  config:
    import:
      - optional:classpath:dev.yml
      - optional:nacos:${spring.application.name}-${spring.profiles.active:dev}.yml
  cloud:
    nacos:
      config:
        enabled: ${NACOS_CONFIG_ENABLED:true}
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yml
        username: ${NACOS_USERNAME:}
        password: ${NACOS_PASSWORD:}
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:true}
        register-enabled: ${NACOS_REGISTER_ENABLED:true}
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        ip: ${NACOS_DISCOVERY_IP:}
        username: ${NACOS_USERNAME:}
        password: ${NACOS_PASSWORD:}
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: ${AUTH_SERVICE_URI:lb://manifest-reader-auth}
              predicates:
                - Path=/auth/**,/internal/auth/**
            - id: admin-service
              uri: ${ADMIN_SERVICE_URI:lb://manifest-reader-admin}
              predicates:
                - Path=/admin/**
            - id: user-service
              uri: ${USER_SERVICE_URI:lb://manifest-reader-user}
              predicates:
                - Path=/user/**
            - id: market-service
              uri: ${MARKET_SERVICE_URI:lb://manifest-reader-market}
              predicates:
                - Path=/market/**

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html

manifest:
  gateway:
    security:
      whitelist:
        - /actuator/**
        - /swagger-ui.html
        - /webjars/**
        - /v3/api-docs/**
        - /auth/login
        - /auth/token/refresh
        - /auth/token/introspect
        - /auth/public-key
      public-key-path: ${GATEWAY_JWT_PUBLIC_KEY_PATH:service/service-auth/target/auth-keys/public.pem}
